<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>shadow-foliant · 智能投研</title>
<link rel="icon" href="data:," /><!-- 空图标:免浏览器去站点根请求 /favicon.ico(不在 /stock/ 下会404) -->
<!-- PWA:可安装到主屏幕、全屏运行 -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0f1320" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<link rel="stylesheet" href="styles.css?v=5" />

<script type="importmap">
{ "imports": { "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.prod.js" } }
</script>
</head>
<body>
<div id="app"></div>
<script type="module" src="app.js?v=4"></script>
<script>
/* 注册 Service Worker(仅安全上下文:HTTPS 或 localhost;手机走 http 局域网会静默跳过,不报错)。
   API 永不被缓存——见 sw.js。*/
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
